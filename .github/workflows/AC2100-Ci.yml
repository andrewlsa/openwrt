
name: OpenWrt Builder

on:
  push:
    branches: 
      - main
  # schedule:
  #   - cron: 0 20 * * *
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.repository.owner.id == github.event.sender.id

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install autoconf automake binutils bison bzip2 cpio curl flex gawk git haveged libncurses5-dev libncursesw5-dev libpython3-dev libssl-dev libtool p7zip p7zip-full patch pkgconf python3 python3-setuptools rsync squashfs-tools swig texinfo upx-ucl unzip vim wget xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean

    - name: Update feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Generate configuration file
      run: |
        rm -f ./.config*
        touch ./.config

        #
        # 在 cat >> .config <<EOF 到 EOF 之间粘贴你的编译配置, 需注意缩进关系
        # 例如:

        cat >> .config <<EOF
        CONFIG_TARGET_ramips=y        
        CONFIG_TARGET_ramips_mt7621=y
        CONFIG_TARGET_ramips_mt7621_DEVICE_xiaomi_redmi-router-ac2100=y

        CONFIG_PACKAGE_luci-app-ssr-plus=y
        CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_Shadowsocks_V2ray_Plugin=y
        CONFIG_PACKAGE_luci-app-ssr-plus_INCLUDE_V2ray=y
        #CONFIG_PACKAGE_v2ray-core=y
        #CONFIG_PACKAGE_v2ray-plugin=y
        EOF

        #
        # ===============================================================
        # 

        sed -i 's/^[ \t]*//g' ./.config
        make defconfig

    - name: Make download
      run: |
        make download -j8 || make download -j1 V=s
        rm -rf $(find ./dl/ -size -1024c)
        df -h

    - name: Compile firmware
      run: |
        make -j$(nproc) || make -j1 V=s
        echo "======================="
        echo "Space usage:"
        echo "======================="
        df -h
        echo "======================="
    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}